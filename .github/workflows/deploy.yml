name: Deploy site

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: deploy
  cancel-in-progress: false

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: web-v2

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: web-v2/pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build roster manifest
        run: pnpm run build:roster

      - name: Build site
        env:
          # Read from repository variables when set, fall back to current
          # production values otherwise. Override via repo Settings →
          # Variables → Actions. See web-v2/.env.example for full contract.
          TEAM_NAME: ${{ vars.TEAM_NAME || 'Weasels' }}
          TEAM_SUBTITLE: ${{ vars.TEAM_SUBTITLE || 'Live competitive reporting with team and player drill-downs.' }}
          TOP_HERO_COUNT: ${{ vars.TOP_HERO_COUNT || '6' }}
          INFLUX_QUERY_URL: ${{ vars.INFLUX_QUERY_URL || 'https://owstats.jhiggins.tech/query' }}
          INFLUX_DATABASE: ${{ vars.INFLUX_DATABASE || 'ow_stats_telegraf' }}
          INFLUX_GAMEMODE: ${{ vars.INFLUX_GAMEMODE || 'competitive' }}
        run: pnpm run build

      - name: Commit refreshed docs/ back to main
        working-directory: ${{ github.workspace }}
        run: |
          set -euo pipefail
          git config user.name  'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add docs
          if git diff --cached --quiet; then
            echo 'No docs/ changes to commit.'
            exit 0
          fi
          git commit -m 'ci: refresh docs/ [skip ci]'

          # Retry push to ride out any concurrent push to main.
          for attempt in 1 2 3 4 5; do
            if git push origin HEAD:main; then
              echo "Pushed on attempt $attempt"
              exit 0
            fi
            echo "Push failed (attempt $attempt). Fetching + rebasing."
            git fetch origin main
            git rebase origin/main
          done
          echo 'Push failed after 5 attempts.'
          exit 1
